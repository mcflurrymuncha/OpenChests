name: Build OpenChests

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    # This tells GitHub to use an Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          # This tells the Ubuntu runner to compile for Windows
          targets: win
          combine: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenChests-Package
          path: ${{ steps.build.outputs.build-output }}
